# CI/CD for Al Qasimia — lint, build on PR/push; deploy to Vercel on main.
# Docs: https://docs.github.com/en/actions/get-started/continuous-integration
#       https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/control-deployments

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token — https://docs.github.com/en/actions/reference/security/secure-use
permissions:
  contents: read
  deployments: write

# Cancel superseded runs on the same branch — https://docs.github.com/en/actions/how-tos/write-workflows/choose-when-workflows-run/control-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  deploy:
    name: Deploy to Vercel
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Track production deployments — https://docs.github.com/en/actions/concepts/workflows-and-actions/deployment-environments
    environment:
      name: production
      url: https://al-qasimia.vercel.app

    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
